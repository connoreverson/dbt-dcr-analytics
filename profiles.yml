dcr_analytics:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: 'target/dcr_analytics.duckdb'
      schema: main
      attach:
        - path: 'source_data/duckdb/dcr_rev_01_vistareserve.duckdb'
          alias: vistareserve
        - path: 'source_data/duckdb/dcr_geo_01_geoparks.duckdb'
          alias: geoparks
        - path: 'source_data/duckdb/dcr_rev_02_legacyres.duckdb'
          alias: legacyres
        - path: 'source_data/duckdb/dcr_fin_01_stategov.duckdb'
          alias: stategov
        - path: 'source_data/duckdb/dcr_fin_02_granttrack.duckdb'
          alias: granttrack
        - path: 'source_data/duckdb/dcr_ast_01_infratrak.duckdb'
          alias: infratrak
        - path: 'source_data/duckdb/dcr_les_01_rangershield.duckdb'
          alias: rangershield
        - path: 'source_data/duckdb/dcr_nrm_01_biosurvey.duckdb'
          alias: biosurvey
        - path: 'source_data/duckdb/dcr_hcm_01_peoplefirst.duckdb'
          alias: peoplefirst
