
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'dcr_analytics'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'dcr_analytics'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  dcr_analytics:
    staging:
      +materialized: view
    integration:
      +materialized: table
    marts:
      +materialized: table

vars:
  # dbt-project-evaluator: teach the evaluator that base_ is a valid prefix
  # for base models that live in the staging layer subdirectories.
  model_types: ['staging', 'intermediate', 'marts', 'other', 'base']
  base_prefixes: ['base_']
  base_folder_name: 'staging'

seeds:
  # Disable the package's default empty exceptions seed so the project's
  # custom version (seeds/dbt_project_evaluator_exceptions.csv) takes effect.
  dbt_project_evaluator:
    dbt_project_evaluator_exceptions:
      +enabled: false
  dcr_analytics:
    cdm_catalogs:
      +column_types:
        description: VARCHAR
        cdm_description: VARCHAR
        cdm_related_attribute: VARCHAR
      +config:
        options:
          quote: '""'
          escape: '""'
          ignore_errors: true
