version: 2

macros:
  - name: cast_park_id_to_varchar
    description: >
      Casts a VistaReserve park identifier from its native integer representation
      to varchar, aligning it with the GeoParks string-typed park ID so that both
      sources can be unioned in int_parks without implicit type coercions.
    arguments:
      - name: column_name
        type: string
        description: >
          The column expression to cast (e.g. 'source.park_id'). Must resolve
          to a value coercible to varchar.

  - name: generate_source_system_tag
    description: >
      Generates the standardized `source_system` literal column identifying 
      the authoritative operational system for a record.
    arguments:
      - name: system_code
        type: string
        description: The internal reference code for a source system (e.g. DCR-REV-01)

  - name: clean_string
    description: >
      A generic utility macro that casts input to varchar, strips all non-alphanumeric 
      characters (except spaces, hyphens, and underscores), and trims bounding whitespace.
    arguments:
      - name: column_name
        type: string
        description: The target column to cleanse.

  - name: generate_staging_model
    description: >
      Codegen utility for scaffolding staging model boilerplate. Invoke via
      `dbt run-operation generate_staging_model --args '{source_schema: <schema>, source_table: <table>}'`
      to print a categorized SELECT with explicit casts for every column in the source relation.
      The output is a starting point — rename columns to business names, add a surrogate key,
      and remove unused columns before committing the file. Not called at model runtime.
    arguments:
      - name: source_schema
        type: string
        description: The dbt source schema name (e.g. vistareserve). Mutually exclusive with relation.
      - name: source_table
        type: string
        description: The raw table name within source_schema to scaffold. Mutually exclusive with relation.
      - name: relation
        type: string
        description: An existing ref() target to scaffold from, instead of a source. Mutually exclusive with source_schema/source_table.

  - name: get_geoparks_account_number
    description: >
      Formats a VistaReserve integer park_id into the GeoParks account number format
      (e.g., park_id 41 → 'GP-041'). Centralizes the ID crosswalk format string so
      that int_transactions and int_customer_assets both use the same logic.
    arguments:
      - name: park_id_column
        type: string
        description: The column expression referencing the VistaReserve integer park_id.

  - name: get_cdm_columns
    description: >
      Queries the consolidated int_cdm_columns model at compile time to retrieve an array
      of authorized column definitions for a given CDM entity.
    arguments:
      - name: entity
        type: string
        description: The target CDM entity to fetch authorized column mappings against.

  - name: generate_cdm_projection
    description: >
      Parses the central cdm_crosswalk to produce a fully validated projection SELECT 
      statement matching local staging models to normalized analytical conventions.
      This macro generates surrogate keys locally without risking raw script string interpretation errors.
    arguments:
      - name: integration_model
        type: string
        description: Target integration model requesting physical mapping projection logic.
      - name: source_model
        type: string
        description: Sourcing staging model from which the projection draws columns and primary key relationships.
      - name: cte_name
        type: string
        description: The specific CTE alias within the integration model containing the joined upstream data.
      - name: sk_source_columns
        type: list
        description: A list of natural key columns (e.g. `['geo_park_id']`) to generate the composite surrogate key. If omitted, falls back to the staging column mapped to the output surrogate key in the crosswalk.
      - name: pass_through_columns
        type: list
        description: A list of columns (e.g. `['_contact_sk', 'source_system']`) that bypass CDM catalog validation and execute directly in the SELECT block. Useful for appending foreign keys after the projection loop finishes.
