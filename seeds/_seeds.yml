version: 2

seeds:
  - name: column_catalog_asset
    description: >
      One row per CDM attribute in the Asset entity group (CustomerAsset, Case, and related entities).
      Sourced from the Microsoft Common Data Model Asset manifest. Consumed by int_cdm_columns and the
      get_cdm_columns macro to validate that integration model column names are authorized CDM fields.
    config:
      column_types:
        is_primary_key: boolean
        is_nullable: boolean
        is_foreign_key: boolean

  - name: column_catalog_visits
    description: >
      One row per CDM attribute in the Visits entity group (Visit and related scheduling entities).
      Sourced from the Microsoft Common Data Model Visits manifest. Consumed by int_cdm_columns and the
      get_cdm_columns macro to validate int_reservations column mappings against the Visit entity.
    config:
      column_types:
        is_primary_key: boolean
        is_nullable: boolean
        is_foreign_key: boolean

  - name: column_catalog_application_common
    description: >
      One row per CDM attribute in the Application Common entity group (shared cross-domain structures
      including currency, address, and annotation entities). Sourced from the Microsoft Common Data Model
      applicationCommon manifest. Consumed by int_cdm_columns to provide shared attribute definitions.
    config:
      column_types:
        is_primary_key: boolean
        is_nullable: boolean
        is_foreign_key: boolean

  - name: column_catalog_cdmfoundation
    description: >
      One row per CDM attribute in the CDM Foundation entity group (foundational traits, data types, and
      base entity definitions shared across all CDM manifests). Sourced from the Microsoft Common Data Model
      cdmfoundation manifest. Consumed by int_cdm_columns as the base layer for column authorization.
    config:
      column_types:
        is_primary_key: boolean
        is_nullable: boolean
        is_foreign_key: boolean

  - name: column_catalog_non_profit_core
    description: >
      One row per CDM attribute in the Non-Profit Core entity group (Contact, Account, Transaction, and
      donation-related entities). Sourced from the Microsoft Common Data Model nonProfitCore manifest.
      Consumed by int_cdm_columns to validate int_contacts, int_transactions, and int_parks column mappings.
    config:
      column_types:
        is_primary_key: boolean
        is_nullable: boolean
        is_foreign_key: boolean

  - name: cdm_crosswalk
    description: >
      One row per column mapping between a staging model and its target CDM integration model.
      Maps local staging column names to their authorized CDM attribute names, grouped by integration model
      and CDM entity. Consumed at compile time by the generate_cdm_projection macro to produce the SELECT
      clause for each integration model.
    config:
      column_types:
        integration_model: varchar
        cdm_entity: varchar
        source_model: varchar
        cdm_column_name: varchar
        staging_column_name: varchar

  - name: reservation_status_codes
    description: >
      Reference mapping table translating system reservation status codes to human-readable labels.
      Used to enrich downstream dimensions and facts with standardized descriptions.
    config:
      column_types:
        status_code: varchar
        status_label: varchar
        is_active: boolean
        sort_order: integer

  - name: transaction_type_codes
    description: >
      Reference mapping table translating POS transaction type codes to their corresponding revenue categories.
      Crucial for grouping granular transactions into aggregate reporting buckets.
    config:
      column_types:
        type_code: varchar
        type_label: varchar
        revenue_category: varchar

  - name: park_region_mappings
    description: >
      Reference mapping table defining the canonical regions assigned to DCR park properties.
      Used to align the authoritative organizational hierarchy within the data mart layer.
    config:
      column_types:
        region_code: varchar
        region_name: varchar
        region_description: varchar

  - name: source_system_registry
    description: >
      Registry mapping active upstream source systems connecting their codes to descriptive names.
      Enables enterprise-wide lineage tagging within data objects across varying domains.
    config:
      column_types:
        source_system_code: varchar
        source_system_name: varchar
        system_type: varchar
        operational_status: varchar
