version: 2

models:
  - name: fct_visitation
    config:
      contract:
        enforced: true
    description: "Fact model merging VistaReserve check-ins with TrafficCount IoT aggregates into a daily park grain."
    meta:
      testing_rationale: "Volumetric scaling helps catch upstream system processing missing days."
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 0
          max_value: 500000
    columns:
      - name: visitation_sk
        description: "Canonical surrogate key for the daily park visitation estimate."
        data_type: varchar
        tests:
          - unique
          - not_null
      - name: parks_sk
        description: "Foreign key linking this record to dim_parks."
        data_type: varchar
      - name: date_sk
        description: "Foreign key linking to dim_date."
        data_type: date
        tests:
          - not_null
      - name: registered_visitors
        description: "Count of tracked guests who checked-in to bookable assets."
        data_type: hugeint
      - name: checked_in_reservations
        description: "Count of distinct reservations that were scanned as checked-in."
        data_type: bigint
      - name: sensor_estimated_visitors
        description: "Count generated by summing IoT sensor inputs utilizing the 2.7 standard vehicle multiplier."
        data_type: hugeint
      - name: total_estimated_visitors
        description: "Combined aggregate of registered check-in guests and un-registered sensor visitor metrics."
        data_type: hugeint
