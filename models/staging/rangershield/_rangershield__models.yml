version: 2

models:
  - name: stg_rangershield__incidents
    description: >
      One row per law-enforcement incident reported by a DCR ranger. Covers all
      incident types from trespass and DUI to search-and-rescue activations and
      wildlife encounters. Incident locations are recorded as free-text narratives
      only — no geographic coordinates exist in this CJIS air-gapped system.
    columns:
      - name: hk_incident
        description: Surrogate key derived from incident_number.
        tests:
          - unique
          - not_null
      - name: incident_number
        description: >
          Year-prefixed sequential identifier assigned by RangerShield at report
          creation (e.g., 2023-000001). Serves as the cross-table join key within
          this system.
        tests:
          - unique
          - not_null
      - name: reporting_officer_badge
        description: Badge number of the ranger who authored the incident report.
        tests:
          - not_null
      - name: incident_type
        description: DCR incident classification category.
        tests:
          - not_null
          - accepted_values:
              values:
                - Assault
                - Drug Offense
                - DUI
                - Lost Person
                - Medical Aid
                - Resource Damage
                - SAR Activation
                - Theft
                - Trespass
                - Wildlife Encounter
      - name: report_timestamp
        description: Timestamp when the incident report was entered into RangerShield.
        tests:
          - not_null
      - name: location_narrative
        description: >
          Free-text description of the incident location (e.g., "Campsite 39, Loop C,
          Park 39"). No structured geographic data is available in this system due to
          CJIS air-gap requirements.
        tests:
          - not_null
      - name: narrative_summary
        description: Full narrative of the incident as written by the reporting officer.
      - name: review_status
        description: Supervisory review state of the incident report.
        tests:
          - not_null
          - accepted_values:
              values:
                - Approved
                - Pending Review
                - Returned for Correction

  - name: stg_rangershield__citations
    description: >
      One row per citation issued by a DCR ranger. Approximately 40 % of citations
      are standalone field citations with no linked incident report; the remainder
      are associated with a formal incident_number.
    columns:
      - name: hk_citation
        description: Surrogate key derived from citation_number.
        tests:
          - unique
          - not_null
      - name: citation_number
        description: Primary identifier assigned by RangerShield at citation issuance.
        tests:
          - unique
          - not_null
      - name: incident_number
        description: >
          Associated incident number. Null for standalone field citations
          (~1,503 of 2,500 rows). Join to stg_rangershield__incidents on this field.
      - name: issuing_officer_badge
        description: Badge number of the ranger who issued the citation.
        tests:
          - not_null
      - name: violation_code
        description: DCR violation code referenced on the citation (e.g., VC-4057).
        tests:
          - not_null
      - name: issue_timestamp
        description: Timestamp when the citation was issued.
        tests:
          - not_null
      - name: fine_amount
        description: Monetary fine assessed on the citation, in USD.
        tests:
          - not_null
      - name: court_disposition
        description: Final court outcome recorded in RangerShield.
        tests:
          - not_null
          - accepted_values:
              values:
                - Dismissed
                - Failure to Appear
                - Guilty
                - Pending

  - name: stg_rangershield__dispatch_logs
    description: >
      One row per CAD radio-traffic or officer-status event. Each incident typically
      generates multiple log entries (Dispatch, On Scene, Position Updates, Clear).
      Radio transcripts are recorded selectively — approximately 80 % of entries
      have no transcript, which is expected for non-verbal status events.
    columns:
      - name: hk_dispatch_log
        description: Surrogate key derived from log_id.
        tests:
          - unique
          - not_null
      - name: log_id
        description: Primary identifier for the log entry (UUID-prefixed CAD string).
        tests:
          - unique
          - not_null
      - name: incident_number
        description: >
          Incident this log entry belongs to. Null for all Position Update events
          (~4,962 of 15,000 rows) — location pings are officer status broadcasts
          not associated with a specific incident.
      - name: badge_number
        description: Officer whose status or radio transmission is being logged.
        tests:
          - not_null
      - name: log_timestamp
        description: Timestamp of the logged event.
        tests:
          - not_null
      - name: event_type
        description: CAD event classification.
        tests:
          - not_null
          - accepted_values:
              values:
                - Clear
                - Dispatch
                - On Scene
                - Position Update
                - Status Check
      - name: radio_traffic_transcript
        description: >
          Verbatim transcript of radio transmission. Null for most entries — transcripts
          are captured selectively for Dispatch and On Scene events only.

  - name: stg_rangershield__officers
    description: >
      One row per DCR law-enforcement officer in the RangerShield roster. This is a
      locally maintained dimension independent of PeopleFirst HR and may contain
      stale or divergent records relative to the HR system of record.
    columns:
      - name: hk_officer
        description: Surrogate key derived from badge_number.
        tests:
          - unique
          - not_null
      - name: badge_number
        description: Primary identifier and operational radio callsign for the officer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: Officer first name.
        tests:
          - not_null
      - name: last_name
        description: Officer last name.
        tests:
          - not_null
      - name: rank
        description: Officer rank within DCR Law Enforcement Services.
        tests:
          - not_null
          - accepted_values:
              values:
                - Captain
                - Corporal
                - Lieutenant
                - Ranger
                - Sergeant
      - name: certification_status
        description: Current CJIS certification state for this officer.
        tests:
          - not_null
          - accepted_values:
              values:
                - Active
                - Suspended
      - name: assigned_region
        description: Primary patrol region assignment (integer region code 1–4).
        tests:
          - not_null

  - name: stg_rangershield__officer_activity
    description: >
      One row per officer per shift. Records daily operational metrics for each
      ranger's shift: mileage driven or walked on patrol, visitor contacts made,
      and resource inspections completed. Patrol miles range from 10.0 to 149.9.
    columns:
      - name: hk_officer_activity
        description: Surrogate key derived from activity_id.
        tests:
          - unique
          - not_null
      - name: activity_id
        description: Primary identifier for the activity record (UUID-prefixed string).
        tests:
          - unique
          - not_null
      - name: badge_number
        description: Officer whose shift activity is being recorded.
        tests:
          - not_null
      - name: shift_date
        description: Calendar date of the shift.
        tests:
          - not_null
      - name: shift_start_time
        description: Timestamp when the officer's shift began.
        tests:
          - not_null
      - name: shift_end_time
        description: Timestamp when the officer's shift ended.
        tests:
          - not_null
      - name: patrol_miles
        description: Total patrol distance in miles for the shift (range 10.0–149.9).
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 10
              max_value: 150
      - name: visitor_contacts
        description: Count of visitor interactions recorded during the shift.
        tests:
          - not_null
      - name: resource_checks
        description: Count of resource (facility/trail/campsite) inspections completed.
        tests:
          - not_null

  - name: stg_rangershield__use_of_force
    description: >
      One row per use-of-force event. Each row documents an instance where a DCR
      ranger applied physical force during an incident. This table contains only
      50 rows, reflecting the infrequency of force application in park law
      enforcement. All records are subject to mandatory internal review under
      CJIS policy.
    columns:
      - name: hk_use_of_force
        description: Surrogate key derived from uof_id.
        tests:
          - unique
          - not_null
      - name: uof_id
        description: Primary identifier for the use-of-force record (UUID-prefixed string).
        tests:
          - unique
          - not_null
      - name: incident_number
        description: Parent incident this use-of-force event belongs to.
        tests:
          - not_null
      - name: involved_officer_badge
        description: Badge number of the officer who applied force.
        tests:
          - not_null
      - name: force_level
        description: Classification of the force type applied.
        tests:
          - not_null
          - accepted_values:
              values:
                - Control Hold
                - OC Spray
                - Taser Deployment
      - name: subject_injury
        description: True if the subject sustained an injury during the use-of-force event.
        tests:
          - not_null
      - name: officer_injury
        description: True if the involved officer sustained an injury.
        tests:
          - not_null
      - name: internal_review_status
        description: Status of the mandatory CJIS internal review for this use-of-force event.
        tests:
          - not_null
          - accepted_values:
              values:
                - Cleared
                - Pending
