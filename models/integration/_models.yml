version: 2

models:
  - name: int_physical_assets
    description: >
      Integration model combining physical infrastructure records from InfraTrak Lifecycle
      (DCR-AST-01) and GeoParks Enterprise (DCR-GEO-01) into the custom CDM PhysicalAsset entity.
      Grain: one row per physical asset or GIS infrastructure feature. Records from both sources
      are preserved as distinct rows — the VistaReserve cross-system crosswalk that nominally
      linked InfraTrak asset tags to GeoParks feature IDs uses legacy identifier formats that do
      not match either system's current records. InfraTrak contributes EAM lifecycle data (replacement value,
      lifespan, condition assessment linkage) for Regions 1 and 2 (2,602 records). GeoParks
      contributes GIS geometry (WKT) and classification for all 50 parks (10,913 records). Both
      populations carry parks_sk to support park-level aggregation in downstream marts.
    meta:
      cdm_entity: PhysicalAsset
      cdm_entity_rationale: >
        See reference/CDM_EXCEPTION_int_physical_assets.md. No standard CDM entity covers
        government physical infrastructure with lifecycle, geometry, and condition attributes.
        A custom PhysicalAsset entity extending Asset.FunctionalLocation is documented there.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - source_system
            - asset_id
    columns:
      - name: physical_assets_sk
        description: >
          Canonical integration surrogate key for this physical asset record. Generated from
          the source-system native identifier (asset_tag for InfraTrak; feature_id for GeoParks).
          Scoped to a single source system — use the combination of source_system and asset_id
          to identify a record across both systems.
        tests:
          - not_null
      - name: asset_id
        description: >
          Native identifier from the originating source system. InfraTrak records carry the
          AST-{park}-{seq} asset tag format; GeoParks records carry the INF-{uuid} feature ID
          format. Scoped to the originating source system; not guaranteed to be distinct across
          both source populations.
        tests:
          - not_null
      - name: parks_sk
        description: >
          Foreign key to int_parks. Identifies the park unit that owns or contains this asset.
          Joined via infratrak_park_id for InfraTrak records and via geo_park_id for GeoParks
          records. Null for assets whose park could not be resolved.
        tests:
          - relationships:
              to: ref('int_parks')
              field: parks_sk
      - name: feature_class
        description: >
          Primary classification of the asset type. Values reflect the originating system's
          taxonomy: InfraTrak categories include Cabin, Trail, Dam, Road, Bridge, Campsite,
          Restroom, Picnic Shelter, Electrical Pedestal, Water Treatment System. GeoParks
          classes include Trail, Road, Building, Bridge, Campsite, Boat Ramp, Parking Area,
          Utility Corridor.
        tests:
          - not_null
      - name: sub_type
        description: >
          Secondary classification refining feature_class. Populated from InfraTrak asset_category
          (same as feature_class; InfraTrak does not have a sub_type) and from GeoParks sub_type
          (e.g., Gravel for trails, Telecom for utility corridors). Null for InfraTrak records.
      - name: description
        description: >
          Free-text description of the asset. Populated for InfraTrak records (e.g.,
          "Restroom at Tall Pines State Park"). Null for GeoParks records — GIS features
          carry only classification attributes, not narrative descriptions.
      - name: installation_year
        description: Year the asset was originally constructed or installed.
      - name: replacement_value
        description: >
          Estimated full replacement cost of the asset in USD, as recorded in InfraTrak.
          Null for GeoParks records — GIS features do not carry financial valuation data.
      - name: expected_lifespan_years
        description: >
          Design lifespan of the asset in years, as recorded in InfraTrak.
          Null for GeoParks records.
      - name: point_latitude
        description: >
          Decimal latitude of the asset's representative point location.
          Populated for InfraTrak records. Null for GeoParks records, which carry
          geometry_wkt instead (including linear features that cannot be represented
          as a single point).
      - name: point_longitude
        description: >
          Decimal longitude of the asset's representative point location.
          Populated for InfraTrak records. Null for GeoParks records.
      - name: geometry_wkt
        description: >
          Spatial geometry in Well-Known Text format. Populated for GeoParks records.
          Null for InfraTrak records, which carry point_latitude and point_longitude instead.
          GeoParks geometry supports linear features (LINESTRING for trails, roads) and
          polygonal structures in addition to points.
      - name: positional_accuracy_meters
        description: >
          Estimated horizontal positional accuracy of the geometry in meters.
          Populated for GeoParks records. Utility corridors carry a documented 5+ meter error.
          Null for InfraTrak records.
      - name: last_updated
        description: >
          Date the GIS team last reviewed or updated this feature's record in GeoParks.
          Null for InfraTrak records, which do not carry a comparable audit timestamp at
          the asset level.
      - name: status
        description: >
          Operational lifecycle status of the asset. Values: Active, Inactive/Abandoned.
          Populated for GeoParks records. Null for InfraTrak records — InfraTrak does not
          model feature retirement in the assets table (decommissioning is tracked via
          work orders).
      - name: is_visible_in_survey
        description: >
          Boolean flag indicating whether this asset is included in InfraTrak's condition
          survey scope. Populated for InfraTrak records. Null for GeoParks records — GIS
          features are not subject to EAM condition surveys.
      - name: source_system
        description: >
          Source system code identifying which operational system produced this record.
          DCR-AST-01 for InfraTrak Lifecycle records; DCR-GEO-01 for GeoParks Enterprise records.
        tests:
          - not_null
          - accepted_values:
              values: ['DCR-AST-01', 'DCR-GEO-01']

  - name: int_parks
    description: >
      Integration model harmonizing park records from GeoParks (DCR-GEO-01), VistaReserve
      (DCR-REV-01), and InfraTrak (DCR-AST-01) into the custom CDM Park entity. Grain: one row
      per unique park, deduplicated via fuzzy name matching with GeoParks as the system of record.
      InfraTrak coverage is limited to Regions 1 and 2 (28 of 50 parks); the infratrak_park_id
      column is preserved to support downstream joins to work orders and condition assessments.
    meta:
      testing_rationale: >
        Tests protect against duplicate park accounts and ensure the primary key is never null.
    columns:
      - name: parks_sk
        description: The canonical integration surrogate key for the park account.
        meta:
          testing_rationale: This business key must be unique across all parks to guarantee safe downstream joins.
        tests:
          - unique
          - not_null
      - name: accountnumber
        description: The original business-recognized identifier of the park property.
        tests:
          - not_null
      - name: name
        description: The business-recognized name of the park property.
      - name: description
        description: Descriptive text about the park, sourced from GeoParks where available.
      - name: address1_city
        description: City component of the park's physical address, sourced from GeoParks.
      - name: address1_stateorprovince
        description: State or province of the park's physical address, sourced from GeoParks.
      - name: address1_postalcode
        description: Postal code of the park's physical address, sourced from GeoParks.
      - name: address1_latitude
        description: Latitude coordinate of the park, sourced from GeoParks.
      - name: address1_longitude
        description: Longitude coordinate of the park, sourced from GeoParks.
      - name: source_system
        description: The authoritative operational system code from which this park record originates (e.g., DCR-GEO-01).
      - name: total_acres
        description: >
          Total geographic area of the park in acres. Sourced from GeoParks where available;
          populated from VistaReserve if GeoParks has no entry for this park.
      - name: classification
        description: The park's administrative classification (e.g., State Park, Recreation Area). Sourced from VistaReserve or InfraTrak.
      - name: region_id
        description: The numeric identifier of the organizational region to which this park belongs. Sourced from VistaReserve or InfraTrak.
      - name: infratrak_park_id
        description: >
          The integer park identifier from InfraTrak (DCR-AST-01), preserved after deduplication to
          enable downstream joins to work order and condition assessment integration models. Null for
          parks not yet onboarded into InfraTrak (Regions 3 and 4).

  - name: int_financial_transactions
    description: >
      Integration model linking StateGov Financials (DCR-FIN-01) general ledger entries
      with GrantTrack (DCR-FIN-02) award data. Grain: one row per GL entry, enriched with
      chart of accounts labels (fund, division, program, object code descriptions) and
      optional grant attribution where the entry's fund code matches an active federal award.
      Entries with no matching award carry null grant fields. The batch_detail_text field
      (pipe-delimited invoice memo) is preserved raw; unpacking is a mart-layer responsibility.
    meta:
      cdm_entity: FinancialTransaction
      cdm_entity_rationale: >
        No standard CDM entity covers public-sector general ledger entries. See
        reference/CDM_EXCEPTION_int_financial_transactions.md for the full evaluation and
        justification for the custom FinancialTransaction entity.
      testing_rationale: >
        Tests protect financial ledger integrity by ensuring every GL entry is uniquely
        represented and that amounts are never null.
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('stg_stategov__general_ledger')
    columns:
      - name: financials_sk
        description: The canonical integration surrogate key for the general ledger entry.
        meta:
          testing_rationale: Duplicate GL entries would inflate expenditure aggregations.
        tests:
          - unique
          - not_null
      - name: gl_entry_id
        description: The original business-recognized identifier for the GL entry from StateGov Financials.
        tests:
          - not_null
      - name: fiscal_year
        description: The fiscal year in which the GL entry was recorded.
      - name: accounting_month
        description: The accounting month (1–12) within the fiscal year for this GL entry.
      - name: entry_type
        description: >
          The classification of the GL entry (e.g., appropriation, allotment, expenditure, revenue)
          as encoded by the StateGov mainframe batch process.
      - name: amount
        description: The monetary value of the GL entry in USD.
        tests:
          - not_null
      - name: account_id
        description: >
          The compound account identifier from StateGov Financials, formatted as
          {fund}-DIV-{division}-PRG-{program}-OBJ-{object}.
      - name: account_fund_code
        description: The fund component of the compound account identifier, used to link GL entries to federal grant awards.
      - name: account_division_code
        description: The division component of the compound account identifier.
      - name: account_program_code
        description: The program component of the compound account identifier.
      - name: account_object_code
        description: The object code component of the compound account identifier, classifying the type of expenditure or revenue.
      - name: fund_description
        description: Human-readable description of the fund, sourced from the StateGov chart of accounts.
      - name: division_description
        description: Human-readable description of the division, sourced from the StateGov chart of accounts.
      - name: program_description
        description: Human-readable description of the program, sourced from the StateGov chart of accounts.
      - name: object_description
        description: Human-readable description of the object code, classifying the nature of the expenditure or revenue.
      - name: batch_reference
        description: The batch identifier from the StateGov mainframe for audit traceability.
      - name: batch_detail_text
        description: >
          Raw pipe-delimited invoice memo from the StateGov batch export
          (format: INV|amount|description|date, repeating). Preserved as-is;
          unpacking to individual invoice rows is a mart-layer responsibility.
      - name: batch_entry_count
        description: Derived count of invoice records embedded in the batch_detail_text memo field.
      - name: award_id
        description: >
          The GrantTrack award identifier for the federal award funding this GL entry.
          Null for entries funded by general-fund appropriations with no matching award.
      - name: award_number
        description: The official award number assigned by the federal grantor. Null for non-grant entries.
      - name: award_amount
        description: >
          The total ceiling amount of the federal award associated with this GL entry's fund code.
          Null for non-grant entries.
      - name: required_match_percentage
        description: >
          The minimum percentage of the award amount that DCR must fund from non-federal sources
          as a match contribution. Null for non-grant entries.
      - name: performance_start
        description: The start date of the award's performance period. Null for non-grant entries.
      - name: performance_end
        description: The end date of the award's performance period. Null for non-grant entries.
      - name: award_fiscal_year_budget
        description: >
          The budgeted amount from GrantTrack for this award in the GL entry's fiscal year.
          Null for non-grant entries or when GrantTrack has no budget row for this year.
      - name: award_fiscal_year_actual
        description: >
          GrantTrack's recorded actual spending for this award in the GL entry's fiscal year.
          Note: a 2–5% reconciliation gap vs. SGF actuals is a known quality issue
          (see reference/data_inventory_summary.md, DCR-FIN-02).
          Null for non-grant entries or when GrantTrack has no actuals for this year.
      - name: source_system
        description: The authoritative operational system code for this record (DCR-FIN-01, StateGov Financials).

  - name: int_contacts
    description: >
      Integration model harmonizing customer profiles from VistaReserve (DCR-REV-01) into
      the CDM Contact entity. Grain: one row per unique customer contact.
    meta:
      testing_rationale: >
        Tests protect against duplicate contacts emerging from the integration layer
        and guarantee downstream referential integrity.
    columns:
      - name: contacts_sk
        description: The canonical integration surrogate key for the constituent contact.
        meta:
          testing_rationale: Duplicate contact IDs would cause fan-outs in fact tables.
        tests:
          - unique
          - not_null
      - name: contact_id
        description: The original business-recognized identifier of the customer from VistaReserve.
        tests:
          - not_null
      - name: first_name
        description: Customer's first name as recorded in VistaReserve.
      - name: last_name
        description: Customer's last name as recorded in VistaReserve.
      - name: e_mail_address1
        description: Customer's primary email address.
      - name: mobile_phone
        description: Customer's mobile or primary phone number.

  - name: int_customer_assets
    description: >
      Integration model harmonizing bookable inventory assets (campsites, cabins, yurts) from
      VistaReserve (DCR-REV-01) into the CDM CustomerAsset entity. Grain: one row per unique
      inventory asset.
    meta:
      testing_rationale: Tests protect referential alignment and ensure every asset is uniquely identifiable.
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('stg_vistareserve__inventory_assets')
    columns:
      - name: customer_assets_sk
        description: The canonical integration surrogate key for the inventory asset.
        meta:
          testing_rationale: Uniqueness is required to prevent reservation double-booking in analytics.
        tests:
          - unique
          - not_null
      - name: customerasset_id
        description: The original business-recognized identifier for the inventory asset from VistaReserve.
        tests:
          - not_null
      - name: _parent_park_sk
        description: Foreign key linking the asset to its parent park in int_parks.
        meta:
          testing_rationale: Assets must belong to a known park.
        tests:
          - not_null
          - relationships:
              to: ref('int_parks')
              field: parks_sk
      - name: name
        description: The asset identifier used as a display name, sourced from the VistaReserve asset ID.

  - name: int_transactions
    description: >
      Harmonized financial transactions from VistaReserve POS (DCR-REV-01) mapped to the CDM
      Transaction entity. Grain: one row per unique point-of-sale transaction.
      Revenue batch records are excluded — they represent daily aggregates and would
      mix grain if included here.
    meta:
      testing_rationale: >
        Tests protect the financial ledger by guaranteeing every transaction is uniquely recorded
        without loss. Cardinality testing ensures no row loss from the POS system staging.
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('stg_vistareserve__pos_transactions')
    columns:
      - name: transactions_sk
        description: The canonical integration surrogate key for the financial transaction.
        meta:
          testing_rationale: Duplicate financial records would inflate revenue aggregations.
        tests:
          - unique
          - not_null
      - name: transaction_id
        description: The original business-recognized identifier for the financial transaction from VistaReserve.
        tests:
          - not_null
      - name: book_date
        description: The date the transaction was booked in the CDM Transaction entity.
      - name: amount
        description: The monetary value of the transaction, mapped to the CDM Transaction amount field.
        meta:
          testing_rationale: Transactions must have a defined numeric value.
        tests:
          - not_null
      - name: _contact_sk
        description: >
          Foreign key linking the transaction to the purchasing contact in int_contacts.
          Nullable because POS transactions may be made by anonymous walk-up customers
          without a registered profile.
        meta:
          testing_rationale: Financial transactions should optionally be attributable to a known contact; POS transactions may be anonymous.
        tests:
          - relationships:
              to: ref('int_contacts')
              field: contacts_sk
      - name: _park_sk
        description: Foreign key linking the transaction to the park where it occurred in int_parks.
        meta:
          testing_rationale: Transactions must originate from a known facility.
        tests:
          - not_null
          - relationships:
              to: ref('int_parks')
              field: parks_sk

  - name: int_visits
    description: >
      Harmonized reservation lifecycle events from VistaReserve (DCR-REV-01) mapped to the CDM
      Visit entity. Grain: one row per unique reservation/visit. Includes foreign keys to
      int_contacts (booking customer) and int_customer_assets (booked asset).
    meta:
      testing_rationale: >
        Tests protect chronological integrity and guarantee reservations map cleanly to
        assets, contacts, and parks.
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('stg_vistareserve__reservations')
    columns:
      - name: visits_sk
        description: The canonical integration surrogate key for the visit/reservation.
        meta:
          testing_rationale: Duplicate visits would distort occupancy metrics.
        tests:
          - unique
          - not_null
      - name: visit_id
        description: The original business-recognized identifier for the visit/reservation from VistaReserve.
        tests:
          - not_null
      - name: _contact_sk
        description: Foreign key linking the reservation to the booking contact in int_contacts.
        tests:
          - not_null
          - relationships:
              to: ref('int_contacts')
              field: contacts_sk
      - name: _asset_sk
        description: Foreign key linking the reservation to the booked asset in int_customer_assets.
        tests:
          - not_null
          - relationships:
              to: ref('int_customer_assets')
              field: customer_assets_sk
      - name: _park_sk
        description: Foreign key linking the reservation to the park, derived from the booked asset's parent park.
