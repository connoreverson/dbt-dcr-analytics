version: 2

models:
  - name: int_physical_assets
    description: >
      Integration model combining physical infrastructure records from InfraTrak Lifecycle
      (DCR-AST-01) and GeoParks Enterprise (DCR-GEO-01) into the custom CDM PhysicalAsset entity.
      Grain: one row per physical asset or GIS infrastructure feature. Records from both sources
      are preserved as distinct rows — the VistaReserve cross-system crosswalk that nominally
      linked InfraTrak asset tags to GeoParks feature IDs uses legacy identifier formats that do
      not match either system's current records. InfraTrak contributes EAM lifecycle data (replacement value,
      lifespan, condition assessment linkage) for Regions 1 and 2 (2,602 records). GeoParks
      contributes GIS geometry (WKT) and classification for all 50 parks (10,913 records). Both
      populations carry parks_sk to support park-level aggregation in downstream marts.
    meta:
      cdm_entity: PhysicalAsset
      cdm_entity_rationale: >
        See reference/CDM_EXCEPTION_int_physical_assets.md. No standard CDM entity covers
        government physical infrastructure with lifecycle, geometry, and condition attributes.
        A custom PhysicalAsset entity extending Asset.FunctionalLocation is documented there.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 10000
          max_value: 20000
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - source_system
            - asset_id
    columns:
      - name: physical_assets_sk
        description: >
          Canonical integration surrogate key for this physical asset record. Generated from
          the source-system native identifier (asset_tag for InfraTrak; feature_id for GeoParks).
          Scoped to a single source system — use the combination of source_system and asset_id
          to identify a record across both systems.
        tests:
          - not_null
      - name: asset_id
        description: >
          Native identifier from the originating source system. InfraTrak records carry the
          AST-{park}-{seq} asset tag format; GeoParks records carry the INF-{uuid} feature ID
          format. Scoped to the originating source system; not guaranteed to be distinct across
          both source populations.
        tests:
          - not_null
      - name: parks_sk
        description: >
          Foreign key to int_parks. Identifies the park unit that owns or contains this asset.
          Joined via infratrak_park_id for InfraTrak records and via geo_park_id for GeoParks
          records. Null for assets whose park could not be resolved.
        tests:
          - relationships:
              to: ref('int_parks')
              field: parks_sk
      - name: feature_class
        description: >
          Primary classification of the asset type. Values reflect the originating system's
          taxonomy: InfraTrak categories include Cabin, Trail, Dam, Road, Bridge, Campsite,
          Restroom, Picnic Shelter, Electrical Pedestal, Water Treatment System. GeoParks
          classes include Trail, Road, Building, Bridge, Campsite, Boat Ramp, Parking Area,
          Utility Corridor.
        tests:
          - not_null
      - name: sub_type
        description: >
          Secondary classification refining feature_class. Populated from InfraTrak asset_category
          (same as feature_class; InfraTrak does not have a sub_type) and from GeoParks sub_type
          (e.g., Gravel for trails, Telecom for utility corridors). Null for InfraTrak records.
      - name: description
        description: >
          Free-text description of the asset. Populated for InfraTrak records (e.g.,
          "Restroom at Tall Pines State Park"). Null for GeoParks records — GIS features
          carry only classification attributes, not narrative descriptions.
      - name: installation_year
        description: Year the asset was originally constructed or installed.
      - name: replacement_value
        description: >
          Estimated full replacement cost of the asset in USD, as recorded in InfraTrak.
          Null for GeoParks records — GIS features do not carry financial valuation data.
      - name: expected_lifespan_years
        description: >
          Design lifespan of the asset in years, as recorded in InfraTrak.
          Null for GeoParks records.
      - name: point_latitude
        description: >
          Decimal latitude of the asset's representative point location.
          Populated for InfraTrak records. Null for GeoParks records, which carry
          geometry_wkt instead (including linear features that cannot be represented
          as a single point).
      - name: point_longitude
        description: >
          Decimal longitude of the asset's representative point location.
          Populated for InfraTrak records. Null for GeoParks records.
      - name: geometry_wkt
        description: >
          Spatial geometry in Well-Known Text format. Populated for GeoParks records.
          Null for InfraTrak records, which carry point_latitude and point_longitude instead.
          GeoParks geometry supports linear features (LINESTRING for trails, roads) and
          polygonal structures in addition to points.
      - name: positional_accuracy_meters
        description: >
          Estimated horizontal positional accuracy of the geometry in meters.
          Populated for GeoParks records. Utility corridors carry a documented 5+ meter error.
          Null for InfraTrak records.
      - name: last_updated
        description: >
          Date the GIS team last reviewed or updated this feature's record in GeoParks.
          Null for InfraTrak records, which do not carry a comparable audit timestamp at
          the asset level.
      - name: status
        description: >
          Operational lifecycle status of the asset. Values: Active, Inactive/Abandoned.
          Populated for GeoParks records. Null for InfraTrak records — InfraTrak does not
          model feature retirement in the assets table (decommissioning is tracked via
          work orders).
      - name: is_visible_in_survey
        description: >
          Boolean flag indicating whether this asset is included in InfraTrak's condition
          survey scope. Populated for InfraTrak records. Null for GeoParks records — GIS
          features are not subject to EAM condition surveys.
      - name: source_system
        description: >
          Source system code identifying which operational system produced this record.
          DCR-AST-01 for InfraTrak Lifecycle records; DCR-GEO-01 for GeoParks Enterprise records.
        tests:
          - not_null
          - accepted_values:
              values: ['DCR-AST-01', 'DCR-GEO-01']

  - name: int_parks
    description: >
      Integration model harmonizing park records from GeoParks (DCR-GEO-01), VistaReserve
      (DCR-REV-01), and InfraTrak (DCR-AST-01) into the custom CDM Park entity. Grain: one row
      per unique park, deduplicated via fuzzy name matching with GeoParks as the system of record.
      InfraTrak coverage is limited to Regions 1 and 2 (28 of 50 parks); the infratrak_park_id
      column is preserved to support downstream joins to work orders and condition assessments.
    meta:
      testing_rationale: >
        Tests protect against duplicate park accounts and ensure the primary key is never null.
        Expect table row count ensures we don't unexpectedly lose park records.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 40
          max_value: 100
    columns:
      - name: parks_sk
        description: The canonical integration surrogate key for the park account.
        meta:
          testing_rationale: This business key must be unique across all parks to guarantee safe downstream joins.
        tests:
          - unique
          - not_null
      - name: accountnumber
        description: The original business-recognized identifier of the park property.
        tests:
          - not_null
      - name: name
        description: The business-recognized name of the park property.
      - name: description
        description: Descriptive text about the park, sourced from GeoParks where available.
      - name: address1_city
        description: City component of the park's physical address, sourced from GeoParks.
      - name: address1_stateorprovince
        description: State or province of the park's physical address, sourced from GeoParks.
      - name: address1_postalcode
        description: Postal code of the park's physical address, sourced from GeoParks.
      - name: address1_latitude
        description: Latitude coordinate of the park, sourced from GeoParks.
      - name: address1_longitude
        description: Longitude coordinate of the park, sourced from GeoParks.
      - name: source_system
        description: The authoritative operational system code from which this park record originates (e.g., DCR-GEO-01).
      - name: total_acres
        description: >
          Total geographic area of the park in acres. Sourced from GeoParks where available;
          populated from VistaReserve if GeoParks has no entry for this park.
      - name: classification
        description: The park's administrative classification (e.g., State Park, Recreation Area). Sourced from VistaReserve or InfraTrak.
      - name: region_id
        description: The numeric identifier of the organizational region to which this park belongs. Sourced from VistaReserve or InfraTrak.
      - name: infratrak_park_id
        description: >
          The integer park identifier from InfraTrak (DCR-AST-01), preserved after deduplication to
          enable downstream joins to work order and condition assessment integration models. Null for
          parks not yet onboarded into InfraTrak (Regions 3 and 4).

  - name: int_financial_transactions
    description: >
      Integration model linking StateGov Financials (DCR-FIN-01) general ledger entries
      with GrantTrack (DCR-FIN-02) award data. Grain: one row per GL entry, enriched with
      chart of accounts labels (fund, division, program, object code descriptions) and
      optional grant attribution where the entry's fund code matches an active federal award.
      Entries with no matching award carry null grant fields. The batch_detail_text field
      (pipe-delimited invoice memo) is preserved raw; unpacking is a mart-layer responsibility.
    meta:
      cdm_entity: FinancialTransaction
      cdm_entity_rationale: >
        No standard CDM entity covers public-sector general ledger entries. See
        reference/CDM_EXCEPTION_int_financial_transactions.md for the full evaluation and
        justification for the custom FinancialTransaction entity.
      testing_rationale: >
        Tests protect financial ledger integrity by ensuring every GL entry is uniquely
        represented and that amounts are never null.
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('stg_stategov__general_ledger')
    columns:
      - name: financials_sk
        description: The canonical integration surrogate key for the general ledger entry.
        meta:
          testing_rationale: Duplicate GL entries would inflate expenditure aggregations.
        tests:
          - unique
          - not_null
      - name: gl_entry_id
        description: The original business-recognized identifier for the GL entry from StateGov Financials.
        tests:
          - not_null
      - name: fiscal_year
        description: The fiscal year in which the GL entry was recorded.
      - name: accounting_month
        description: The accounting month (1–12) within the fiscal year for this GL entry.
      - name: entry_type
        description: >
          The classification of the GL entry (e.g., appropriation, allotment, expenditure, revenue)
          as encoded by the StateGov mainframe batch process.
      - name: amount
        description: The monetary value of the GL entry in USD.
        meta:
          business_rule: Negative amounts represent valid refunds and adjustments.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -10000000
              max_value: 10000000
      - name: account_id
        description: >
          The compound account identifier from StateGov Financials, formatted as
          {fund}-DIV-{division}-PRG-{program}-OBJ-{object}.
      - name: account_fund_code
        description: The fund component of the compound account identifier, used to link GL entries to federal grant awards.
      - name: account_division_code
        description: The division component of the compound account identifier.
      - name: account_program_code
        description: The program component of the compound account identifier.
      - name: account_object_code
        description: The object code component of the compound account identifier, classifying the type of expenditure or revenue.
      - name: fund_description
        description: Human-readable description of the fund, sourced from the StateGov chart of accounts.
      - name: division_description
        description: Human-readable description of the division, sourced from the StateGov chart of accounts.
      - name: program_description
        description: Human-readable description of the program, sourced from the StateGov chart of accounts.
      - name: object_description
        description: Human-readable description of the object code, classifying the nature of the expenditure or revenue.
      - name: batch_reference
        description: The batch identifier from the StateGov mainframe for audit traceability.
      - name: batch_detail_text
        description: >
          Raw pipe-delimited invoice memo from the StateGov batch export
          (format: INV|amount|description|date, repeating). Preserved as-is;
          unpacking to individual invoice rows is a mart-layer responsibility.
      - name: batch_entry_count
        description: Derived count of invoice records embedded in the batch_detail_text memo field.
      - name: award_id
        description: >
          The GrantTrack award identifier for the federal award funding this GL entry.
          Null for entries funded by general-fund appropriations with no matching award.
      - name: award_number
        description: The official award number assigned by the federal grantor. Null for non-grant entries.
      - name: award_amount
        description: >
          The total ceiling amount of the federal award associated with this GL entry's fund code.
          Null for non-grant entries.
      - name: required_match_percentage
        description: >
          The minimum percentage of the award amount that DCR must fund from non-federal sources
          as a match contribution. Null for non-grant entries.
      - name: performance_start
        description: The start date of the award's performance period. Null for non-grant entries.
      - name: performance_end
        description: The end date of the award's performance period. Null for non-grant entries.
      - name: award_fiscal_year_budget
        description: >
          The budgeted amount from GrantTrack for this award in the GL entry's fiscal year.
          Null for non-grant entries or when GrantTrack has no budget row for this year.
      - name: award_fiscal_year_actual
        description: >
          GrantTrack's recorded actual spending for this award in the GL entry's fiscal year.
          Note: a 2–5% reconciliation gap vs. SGF actuals is a known quality issue
          (see reference/data_inventory_summary.md, DCR-FIN-02).
          Null for non-grant entries or when GrantTrack has no actuals for this year.
      - name: source_system
        description: The authoritative operational system code for this record (DCR-FIN-01, StateGov Financials).

  - name: int_contacts
    description: >
      3NF extensible integration model representing the canonical contact entity across DCR
      source systems. Currently sourced from VistaReserve (DCR-REV-01); the schema is
      intentionally designed to absorb contacts from additional systems (staff directories,
      permit applicants, partner organizations) without structural change.
      Grain: one row per unique customer contact.
    meta:
      integration_pattern: 3nf_extensible
      testing_rationale: >
        Tests protect against duplicate contacts emerging from the integration layer
        and guarantee downstream referential integrity.
    columns:
      - name: contacts_sk
        description: The canonical integration surrogate key for the constituent contact.
        meta:
          testing_rationale: Duplicate contact IDs would cause fan-outs in fact tables.
        tests:
          - unique
          - not_null
      - name: contact_id
        description: The original business-recognized identifier of the customer from VistaReserve.
        tests:
          - not_null
      - name: first_name
        description: Customer's first name as recorded in VistaReserve.
      - name: last_name
        description: Customer's last name as recorded in VistaReserve.
      - name: e_mail_address1
        description: Customer's primary email address.
      - name: mobile_phone
        description: Customer's mobile or primary phone number.
      - name: is_merged_duplicate
        description: Flag indicating if this customer profile was merged into another profile due to duplication.
      - name: address_state
        description: The state of residence provided by the customer.
      - name: account_created_at
        description: Timestamp when the profile was first registered.
      - name: has_annual_pass
        description: Flag indicating if the customer holds a valid annual parks pass.
      - name: is_senior
        description: Flag indicating if the customer qualifies for senior discounts.
      - name: is_veteran
        description: Flag indicating if the customer qualifies for veteran discounts.

  - name: int_customer_assets
    description: >
      3NF extensible integration model representing bookable inventory assets (campsites, cabins,
      yurts, day-use areas) across DCR reservation systems. Currently sourced from VistaReserve
      (DCR-REV-01); the schema is designed to absorb assets from additional reservation platforms
      or facility management systems. Each asset belongs to a parent park via _parent_park_sk.
      Grain: one row per unique inventory asset.
    meta:
      integration_pattern: 3nf_extensible
      testing_rationale: Tests protect referential alignment and ensure every asset is uniquely identifiable.
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('stg_vistareserve__inventory_assets')
    columns:
      - name: customer_assets_sk
        description: The canonical integration surrogate key for the inventory asset.
        meta:
          testing_rationale: Uniqueness is required to prevent reservation double-booking in analytics.
        tests:
          - unique
          - not_null
      - name: customerasset_id
        description: The original business-recognized identifier for the inventory asset from VistaReserve.
        tests:
          - not_null
      - name: _parent_park_sk
        description: Foreign key linking the asset to its parent park in int_parks.
        meta:
          testing_rationale: Assets must belong to a known park.
        tests:
          - not_null
          - relationships:
              to: ref('int_parks')
              field: parks_sk
      - name: name
        description: The asset identifier used as a display name, sourced from the VistaReserve asset ID.

  - name: int_transactions
    description: >
      3NF extensible integration model representing point-of-sale financial transactions across
      DCR revenue systems. Currently sourced from VistaReserve POS (DCR-REV-01); the schema is
      designed to absorb transactions from additional payment processors or kiosk systems.
      Revenue batch records are excluded — they represent daily aggregates and would mix grain.
      Grain: one row per unique point-of-sale transaction.
    meta:
      integration_pattern: 3nf_extensible
      testing_rationale: >
        Tests protect the financial ledger by guaranteeing every transaction is uniquely recorded
        without loss. Cardinality testing ensures no row loss from the POS system staging.
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('stg_vistareserve__pos_transactions')
    columns:
      - name: transactions_sk
        description: The canonical integration surrogate key for the financial transaction.
        meta:
          testing_rationale: Duplicate financial records would inflate revenue aggregations.
        tests:
          - unique
          - not_null
      - name: transaction_id
        description: The original business-recognized identifier for the financial transaction from VistaReserve.
        tests:
          - not_null
      - name: book_date
        description: The date the transaction was booked in the CDM Transaction entity.
      - name: amount
        description: The monetary value of the transaction, mapped to the CDM Transaction amount field.
        meta:
          testing_rationale: Transactions must have a defined numeric value.
        tests:
          - not_null
      - name: _contact_sk
        description: >
          Foreign key linking the transaction to the purchasing contact in int_contacts.
          Nullable because POS transactions may be made by anonymous walk-up customers
          without a registered profile.
        meta:
          testing_rationale: Financial transactions should optionally be attributable to a known contact; POS transactions may be anonymous.
        tests:
          - relationships:
              to: ref('int_contacts')
              field: contacts_sk
      - name: _park_sk
        description: Foreign key linking the transaction to the park where it occurred in int_parks.
        meta:
          testing_rationale: Transactions must originate from a known facility.
        tests:
          - not_null
          - relationships:
              to: ref('int_parks')
              field: parks_sk

  - name: int_visits
    description: >
      Harmonized reservation lifecycle events from VistaReserve (DCR-REV-01) mapped to the CDM
      Visit entity. Grain: one row per unique reservation/visit. Includes foreign keys to
      int_contacts (booking customer) and int_customer_assets (booked asset).
    meta:
      testing_rationale: >
        Tests protect chronological integrity and guarantee reservations map cleanly to
        assets, contacts, and parks.
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('stg_vistareserve__reservations')
    columns:
      - name: visits_sk
        description: The canonical integration surrogate key for the visit/reservation.
        meta:
          testing_rationale: Duplicate visits would distort occupancy metrics.
        tests:
          - unique
          - not_null
      - name: visit_id
        description: The original business-recognized identifier for the visit/reservation from VistaReserve.
        tests:
          - not_null
      - name: _contact_sk
        description: Foreign key linking the reservation to the booking contact in int_contacts.
        tests:
          - not_null
          - relationships:
              to: ref('int_contacts')
              field: contacts_sk
      - name: _asset_sk
        description: Foreign key linking the reservation to the booked asset in int_customer_assets.
        tests:
          - not_null
          - relationships:
              to: ref('int_customer_assets')
              field: customer_assets_sk
      - name: _park_sk
        description: Foreign key linking the reservation to the park, derived from the booked asset's parent park.

  - name: int_ecological_surveys
    description: >
      Integration model unifying three ecological observation types from BioSurvey_Legacy
      (DCR-NRM-01) into the custom CDM EcologicalSurvey entity. Grain: one row per ecological
      observation event — a flora/fauna species sighting, a water quality sampling event, or an
      invasive species field observation. All three types are linked to a named survey site, which
      carries an integer park_id resolved to parks_sk via int_parks. Type-specific columns are null
      for the other observation types; the observation_type column identifies the active schema.
      9,550 flora/fauna records, 2,450 water quality tests, and 2,500 invasive species observations
      (14,500 total) from surveys spanning 1993 to present.
    meta:
      cdm_entity: EcologicalSurvey
      cdm_entity_rationale: >
        No standard CDM entity covers ecological field survey observations — neither species
        presence/abundance data, water quality parameters, nor invasive species treatment records.
        See reference/CDM_EXCEPTION_int_ecological_surveys.md for the full candidate evaluation
        and the custom EcologicalSurvey entity definition.
      testing_rationale: >
        The surrogate key includes the observation type as a prefix to guarantee cross-type
        uniqueness. The unique_combination_of_columns test confirms that no (type, id) pair
        appears more than once in the union output.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 12000
          max_value: 18000
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - observation_type
            - observation_id
    columns:
      - name: ecological_surveys_sk
        description: >
          Canonical integration surrogate key for this ecological observation record. Generated
          from the observation type and the native source identifier, so the key is globally
          distinct across all three observation types in this model.
        tests:
          - unique
          - not_null
      - name: observation_id
        description: >
          Native identifier from the originating BioSurvey table. FFS-{seq} format for flora
          and fauna surveys; test_id format for water quality tests; observation_id format for
          invasive species observations.
        tests:
          - not_null
      - name: site_id
        description: >
          Foreign key to stg_biosurvey__survey_sites. Identifies the named ecological monitoring
          station where this observation was recorded.
        tests:
          - not_null
          - relationships:
              to: ref('stg_biosurvey__survey_sites')
              field: site_id
      - name: parks_sk
        description: >
          Foreign key to int_parks. Resolved from the survey site's integer park_id via
          infratrak_park_id. Null if the site's park_id has no matching record in int_parks.
        tests:
          - relationships:
              to: ref('int_parks')
              field: parks_sk
      - name: observation_type
        description: >
          Discriminator identifying the ecological observation type for this row.
          flora_fauna: species presence and abundance survey.
          water_quality: abiotic water parameter sampling event.
          invasive_species: regulated invasive organism occurrence and treatment record.
        tests:
          - not_null
          - accepted_values:
              values: ['flora_fauna', 'water_quality', 'invasive_species']
      - name: observation_date
        description: Date the field observation or sampling event was conducted.
        tests:
          - not_null
      - name: species_code
        description: >
          Species identifier from the BioSurvey species codes reference table. Populated for
          flora_fauna and invasive_species records. Null for water_quality records, which
          measure abiotic parameters and are not species-specific.
      - name: observer_name
        description: >
          Name of the field biologist who conducted the survey. Populated for flora_fauna records.
          Null for water_quality and invasive_species records, which do not track individual
          observers in BioSurvey_Legacy.
      - name: latitude
        description: >
          WGS84 decimal latitude of the observation point. Populated for flora_fauna and
          invasive_species records, which capture GPS coordinates at the observation level.
          Null for water_quality records — location is inherited from the survey site.
      - name: longitude
        description: >
          WGS84 decimal longitude of the observation point. Populated for flora_fauna and
          invasive_species records. Null for water_quality records.
      - name: count_estimate
        description: >
          Estimated count of individuals observed during the survey. Populated for flora_fauna
          records. Null for water_quality and invasive_species records.
      - name: density_estimate_per_hectare
        description: >
          Estimated density of the observed species in individuals per hectare. Populated for
          flora_fauna records. Null for other observation types.
      - name: extent_square_meters
        description: >
          Measured spatial extent of the invasive species infestation in square meters.
          Populated for invasive_species records. Null for flora_fauna and water_quality records.
      - name: treatment_applied
        description: >
          Treatment method applied to the invasive species occurrence (e.g., Herbicide Application,
          Manual Removal). Populated for invasive_species records. Null for other types.
      - name: treatment_date
        description: >
          Date the treatment was applied to the invasive species occurrence. Populated for
          invasive_species records where treatment occurred. Null for untreated observations
          and for other observation types.
      - name: dissolved_oxygen_mgl
        description: >
          Dissolved oxygen concentration in milligrams per liter. Populated for water_quality
          records. Null for flora_fauna and invasive_species records.
      - name: ph_level
        description: >
          Water acidity/alkalinity on the pH scale (0–14). Populated for water_quality records.
          Null for other observation types.
      - name: ecoli_cfu_100ml
        description: >
          E. coli colony-forming units per 100 milliliters of water sample. Populated for
          water_quality records. The staging model normalizes the legacy text values
          (">2000", "TNTC") to integer upper bounds. Null for other observation types.
      - name: turbidity_ntu
        description: >
          Water turbidity in Nephelometric Turbidity Units. Populated for water_quality records.
          Null for other observation types.
      - name: temperature_celsius
        description: >
          Water temperature in degrees Celsius at the time of sampling. Populated for
          water_quality records. Null for other observation types.
      - name: nitrogen_mgl
        description: >
          Total nitrogen concentration in milligrams per liter. Populated for water_quality
          records collected under the 2005-2018 and 2018+ protocol eras; may be null for
          pre-2005 records where this parameter was not measured.
      - name: phosphorus_mgl
        description: >
          Total phosphorus concentration in milligrams per liter. Populated for water_quality
          records collected under the 2005-2018 and 2018+ protocol eras. Null for pre-2005 records.
      - name: protocol_era
        description: >
          The water quality testing protocol version under which this sample was collected.
          Values: pre-2005, 2005-2018, 2018+. Relevant for longitudinal analysis because
          the three eras use different instruments and parameter sets, limiting direct comparisons.
          Populated for water_quality records. Null for other observation types.

  - name: int_visitor_counts
    description: >
      Integration model combining daily visitor count estimates from TrafficCount_IoT
      (DCR-VUM-01) with sensor metadata into the custom CDM VisitorCount entity. Grain: one row
      per sensor per day. The vehicle occupancy multiplier (2.7) is applied by the TrafficCount
      vendor's derived_visitor_metrics calculation and is preserved per record to support
      sensitivity analysis. Only active, non-deleted records are included. Covers 20 sensors at
      8 park entrances and 12 trailheads from the 2024 pilot; 85% of parks have no sensor coverage.
    meta:
      cdm_entity: VisitorCount
      cdm_entity_rationale: >
        No standard CDM entity covers automated IoT visitor counting with an occupancy
        multiplier. See reference/CDM_EXCEPTION_int_visitor_counts.md for the full candidate
        evaluation and the custom VisitorCount entity definition.
      testing_rationale: >
        Row count tests are omitted because the source derived_visitor_metrics includes
        soft-deleted records filtered out in this model.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - sensor_id
            - target_date
    columns:
      - name: visitor_counts_sk
        description: >
          Canonical integration surrogate key for this visitor count record, generated from
          the TrafficCount metric_id.
        tests:
          - unique
          - not_null
      - name: metric_id
        description: >
          Native identifier for the daily visitor estimate record from TrafficCount derived
          metrics. Format: DVM-{sensor_id}-{YYYYMMDD}.
        tests:
          - not_null
      - name: sensor_id
        description: >
          Foreign key to stg_trafficcount__sensor_locations. Identifies the IoT sensor that
          generated the raw counts underlying this daily estimate.
        tests:
          - not_null
          - relationships:
              to: ref('stg_trafficcount__sensor_locations')
              field: sensor_id
      - name: parks_sk
        description: >
          Foreign key to int_parks. Resolved from the sensor's integer park_id via
          infratrak_park_id. Identifies the park where this sensor is installed.
        tests:
          - not_null
          - relationships:
              to: ref('int_parks')
              field: parks_sk
      - name: target_date
        description: The calendar date for which this daily visitor estimate was calculated.
        tests:
          - not_null
      - name: estimated_total_visitors
        description: >
          Estimated total person-visits for this sensor on this date, calculated by the
          TrafficCount vendor system. Vehicle counts are multiplied by vehicle_multiplier_used;
          pedestrian and cyclist counts are added directly.
        tests:
          - not_null
      - name: vehicle_multiplier_used
        description: >
          The vehicle occupancy multiplier applied in this estimate's calculation. The standard
          value is 2.7, inherited from a 2019 occupancy study; this multiplier has not been
          revalidated since. Preserved per record to support downstream sensitivity analysis.
        tests:
          - not_null
      - name: calculation_timestamp
        description: >
          Timestamp when the TrafficCount vendor system calculated this daily estimate.
          Used for audit traceability and to detect restatements.
      - name: sensor_type
        description: >
          Classification of the IoT sensor technology. Values include Vehicle Magnetometer
          (installed at entrance gates) and Pedestrian/Cyclist Infrared (installed at
          trailheads). Sourced from stg_trafficcount__sensor_locations.
      - name: location_description
        description: >
          Human-readable description of where this sensor is physically installed
          (e.g., "Main Entrance Gate", "North Trailhead"). Sourced from
          stg_trafficcount__sensor_locations.

  - name: int_employees
    description: >
      Integration model denormalizing three PeopleFirst HR staging models — employees,
      positions, and org_units — into a single record per active DCR employee. Grain:
      one row per active classified employee (soft-deleted records excluded). PII fields
      (name, email, phone) are carried as MD5 hashes; PeopleFirst is a Confidential-rated
      system (SSN, salary, medical leave). Duty station is recorded at the org-unit level
      only — PeopleFirst does not track park-specific assignments, so no parks_sk is
      produced. Seasonal workers (stg_peoplefirst__seasonal_workforce) are excluded from
      this model and require a separate integration model. 680 active employee records.
    meta:
      cdm_entity: Employee
      cdm_entity_rationale: >
        No standard CDM entity covers government civil service employees with pay-grade
        classification, org-unit duty stations, and government benefits structure. The CDM
        Worker entity (HCM module) would be the appropriate mapping, but the HCM manifest
        is not included in the curated catalog for this project. See
        reference/CDM_EXCEPTION_int_employees.md for the full candidate evaluation and the
        custom Employee entity definition.
      testing_rationale: >
        The surrogate key is generated from employee_id. Uniqueness on employees_sk is the
        primary data quality guarantee. The position_id and org_unit_id FK tests use
        relationships tests to confirm no orphaned position or org unit references exist
        after the is_deleted filter.
    columns:
      - name: employees_sk
        description: >
          Canonical integration surrogate key for this employee record, generated from
          the PeopleFirst employee_id.
        tests:
          - unique
          - not_null
      - name: employee_id
        description: >
          Native identifier from PeopleFirst. Format: EMP-{uuid fragment}. Used as the
          business key for this entity across HR reporting and downstream workforce marts.
        tests:
          - unique
          - not_null
      - name: first_name_hash
        description: >
          MD5 hash of the employee's first name. PeopleFirst is a Confidential-rated system;
          clear-text PII is hashed at the staging layer and not reconstructed at integration.
      - name: last_name_hash
        description: MD5 hash of the employee's last name.
      - name: email_hash
        description: MD5 hash of the employee's work email address.
      - name: phone_hash
        description: MD5 hash of the employee's phone number.
      - name: hire_date
        description: >
          Date the employee was hired into DCR classified service under their current
          position. Null values are unexpected for active employees and indicate a data
          quality gap in PeopleFirst.
        tests:
          - not_null
      - name: separation_date
        description: >
          Date the employee separated from DCR service. Null for currently active
          employees. This model filters is_deleted = true records, so all rows represent
          either active employees or employees whose separation has not yet been marked
          as deleted in PeopleFirst.
      - name: position_id
        description: >
          Foreign key to stg_peoplefirst__positions. Identifies the classified position
          slot this employee occupies. A position defines the job classification, pay
          grade, and org unit.
        tests:
          - not_null
      - name: job_classification
        description: >
          The civil service job class title for this employee's position (e.g., Maintenance
          Worker I, Biologist, Park Ranger). Sourced from PeopleFirst positions.
        tests:
          - not_null
      - name: pay_grade
        description: >
          Government pay grade for this position (e.g., GR-15, GR-23). Determines the
          salary band for the position. Sourced from PeopleFirst positions.
        tests:
          - not_null
      - name: funding_source
        description: >
          The funding mechanism for this position (e.g., General Fund, Grant, Special
          Revenue). Sourced from PeopleFirst positions. Used to distinguish grant-funded
          positions from appropriated headcount.
      - name: position_is_active
        description: >
          Whether the position slot is currently active and budgeted in PeopleFirst. An
          employee may be assigned to an inactive position if the position was deactivated
          after hire; downstream workforce models should filter or annotate these cases.
      - name: org_unit_id
        description: >
          Identifier for the DCR organizational unit this employee's position belongs to
          (e.g., R2-RECR, HQ-EXEC). Sourced from PeopleFirst org_units. The org unit is
          the finest-grained duty station available in PeopleFirst.
        tests:
          - not_null
      - name: org_unit_name
        description: >
          Human-readable name of the organizational unit (e.g., Region 2 - Recreation,
          Headquarters - Finance). Sourced from PeopleFirst org_units.
      - name: region_id
        description: >
          DCR administrative region (1–4) to which this org unit belongs. Sourced from
          PeopleFirst org_units. This is the coarsest available geographic attribution
          for an employee; PeopleFirst does not record park-specific duty stations.
          Downstream marts that require employee-to-park linkage must use region_id as
          a 1:M relationship to int_parks.region_id.
      - name: source_system
        description: Source system code for this record. Always DCR-HCM-01 (PeopleFirst HR).

  - name: int_officer_shifts
    description: >
      Integration model combining RangerShield CAD/RMS officer activity logs with the
      officer roster into the custom CDM OfficerShift entity. Grain: one row per officer
      per shift (activity_id from RangerShield officer_activity). This model is isolated
      from all non-RangerShield integration models per CJIS governance requirements — no
      parks_sk or cross-domain foreign keys are produced at this layer. Officer assignment
      is captured at the region level (assigned_region) only. 3,000 shift records from
      the active officer roster. Incidents, citations, dispatch logs, and use-of-force
      records are separate RangerShield entities not covered by this model.
    meta:
      cdm_entity: OfficerShift
      cdm_entity_rationale: >
        No standard CDM entity covers law enforcement patrol shift metrics — patrol miles,
        visitor contacts, resource checks, officer rank, and certification status have no
        CDM analog in any available manifest. The CDM does not include a public safety or
        law enforcement module. CJIS air-gap compliance additionally prohibits cross-domain
        joins at this layer, making CDM integration with non-LE entities structurally
        impossible. See reference/CDM_EXCEPTION_int_officer_shifts.md for the full
        candidate evaluation and the custom OfficerShift entity definition.
      testing_rationale: >
        activity_id uniqueness is the primary data quality guarantee. The badge_number FK
        test confirms all shift records resolve to a known officer in the roster. No
        parks_sk test is applied because this model intentionally produces no park FK.
    columns:
      - name: officer_shifts_sk
        description: >
          Canonical integration surrogate key for this patrol shift record, generated
          from the RangerShield activity_id.
        tests:
          - unique
          - not_null
      - name: activity_id
        description: >
          Native identifier for this shift record from RangerShield officer_activity.
          Format: ACT-{uuid fragment}. Used as the business key for this entity.
        tests:
          - unique
          - not_null
      - name: badge_number
        description: >
          The law enforcement badge number of the officer who logged this shift.
          Foreign key to stg_rangershield__officers within the RangerShield source
          boundary. Not joined to any non-RangerShield integration model.
        tests:
          - not_null
          - relationships:
              to: ref('stg_rangershield__officers')
              field: badge_number
      - name: shift_date
        description: >
          Calendar date on which this patrol shift occurred. The shift may span midnight
          (shift_end_time may be on the following day for overnight shifts).
        tests:
          - not_null
      - name: shift_start_time
        description: >
          Timestamp when the officer's patrol shift began. Logged by the RangerShield
          CAD system when the officer checks in for duty.
        tests:
          - not_null
      - name: shift_end_time
        description: >
          Timestamp when the officer's patrol shift ended. May be on the calendar day
          following shift_date for overnight shifts.
        tests:
          - not_null
      - name: patrol_miles
        description: >
          Distance patrolled by the officer during this shift, in statute miles. Recorded
          manually by the officer in RangerShield at shift close.
      - name: visitor_contacts
        description: >
          Count of documented visitor interactions during this shift — informational
          contacts, compliance checks, and interpretive encounters as logged in
          RangerShield. Does not include enforcement actions (citations).
      - name: resource_checks
        description: >
          Count of natural resource condition checks performed during this shift — trail
          condition assessments, water feature inspections, and resource impact documentation
          as logged in RangerShield.
      - name: rank
        description: >
          The officer's law enforcement rank at the time of the shift. Values: Ranger,
          Corporal, Sergeant, Lieutenant, Captain. Sourced from the RangerShield officer
          roster; not historically tracked per-shift.
      - name: certification_status
        description: >
          The officer's CJIS/POST certification status as of the current roster snapshot.
          Values: Active, Suspended, Expired. Officers with Suspended or Expired status
          in the current roster may have had Active status at the time of a historical shift.
      - name: assigned_region
        description: >
          The DCR administrative region (1–4) to which the officer is assigned for patrol
          duties. Sourced from the RangerShield officer roster. Region is the coarsest
          geographic attribution available from RangerShield; no park-level assignment
          is recorded for officers in this system.
      - name: source_system
        description: >
          Source system code for this record. Always DCR-LES-01 (RangerShield CAD/RMS).
